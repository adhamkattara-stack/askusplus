<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Favicon Generator</title>
<style>
  body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#eee;
  }
  .icon {
    width:256px;
    height:256px;
    background:#0b1c2d;
    border-radius:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:160px;
    font-weight:800;
    color:#d4af37;
    font-family:Inter, sans-serif;
  }
</style>
</head>
<body>
<div class="icon">A</div>
</body>
</html>
