<!-- ================= CONTACT HERO ================= -->
<section class="hero contact-hero">

<!-- CONTACT BANNER -->

<div class="section-divider"></div>

<!-- CONTACT -->
<section>
  <div class="container">
    <h2 class="section-title" data-i18n="contact_form_title">
      Start Your Free Consultation
    </h2>

    <div class="cards contact-grid">

      <!-- INFO -->
      <div class="card">
        <h3 data-i18n="contact_why_title">Why Ask Us Plus?</h3>
        <p data-i18n="contact_why_desc"></p>
        <ul class="contact-list">
          <li data-i18n="contact_point_1"></li>
          <li data-i18n="contact_point_2"></li>
          <li data-i18n="contact_point_3"></li>
          <li data-i18n="contact_point_4"></li>
        </ul>
      </div>

      <!-- FORM -->
      <div class="card">
        <form class="contact-form" id="contactForm">

          <div class="form-group">
            <label data-i18n="contact_name_label">Full Name</label>
            <input id="contactName" type="text" required />
          </div>

          <div class="form-group">
            <label data-i18n="contact_phone_label">Phone Number</label>
            <div class="phone-group">
              <select id="contactCountryCode" class="country-code">
                <option value="+20">🇪🇬 +20</option>
                <option value="+966">🇸🇦 +966</option>
                <option value="+971">🇦🇪 +971</option>
                <option value="+965">🇰🇼 +965</option>
                <option value="+974">🇶🇦 +974</option>
              </select>
              <input id="contactPhone" type="tel" required />
            </div>
          </div>

          <div class="form-group">
            <label data-i18n="contact_email_label">Email</label>
            <input id="contactEmail" type="email" required />
          </div>

          <div class="form-group">
            <label data-i18n="contact_service_label">Service</label>
            <select id="contactService" required>
              <option value="" data-i18n="contact_service_select"></option>
              <option value="Paid Ads" data-i18n="service_paid"></option>
              <option value="Social Media" data-i18n="service_social"></option>
              <option value="Web Design" data-i18n="service_web"></option>
              <option value="Content Creation" data-i18n="service_content_creation"></option>
              <option value="Video Production" data-i18n="service_video_production"></option>
              <option value="Mobile Application" data-i18n="service_mobile_app"></option>
              <option value="Other" data-i18n="service_other"></option>
            </select>
          </div>

          <div class="form-group">
            <label data-i18n="contact_message_label">Message</label>
            <textarea id="contactMessage" rows="4" required></textarea>
          </div>

          <button type="submit" class="btn primary full" data-i18n="contact_submit">
            Send Message
          </button>

        </form>
      </div>

    </div>
  </div>
</section>
